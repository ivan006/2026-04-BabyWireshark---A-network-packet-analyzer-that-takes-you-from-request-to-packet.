<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BabyWireshark</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      #packets-tbody tr:hover {
        background: rgba(255, 255, 255, 0.04);
      }

      #packets-tbody tr:hover td {
        color: #fff !important;
      }
    </style>
  </head>

  <body class="bg-dark text-light min-vh-100">
    <header class="border-bottom border-secondary px-4 py-3">
      <h1 class="fs-4 fw-semibold text-primary mb-0">BabyWireshark</h1>
      <p class="text-secondary small mb-0">
        A network packet analyser that takes you from request to packet
      </p>
    </header>

    <main class="container-lg py-4">
      <div class="d-flex gap-2 mb-3">
        <input
          type="text"
          id="url-input"
          class="form-control bg-dark text-light border-secondary"
          placeholder="https://example.com"
        />
        <button
          id="inspect-btn"
          class="btn btn-primary px-4"
          onclick="startInspect()"
        >
          Inspect
        </button>
      </div>

      <div id="status-bar" class="alert alert-secondary mb-3 py-2 small"></div>

      <div id="resolved-info" class="row g-2 mb-3 d-none"></div>

      <div id="packets-table" class="d-none">
        <table class="table table-dark table-hover table-borderless mb-0">
          <thead>
            <tr style="border-bottom: 1px solid rgba(255, 255, 255, 0.1)">
              <th
                class="text-secondary fw-normal small pb-2"
                style="width: 40px"
              >
                #
              </th>
              <th class="text-secondary fw-normal small pb-2">
                Protocol stack
              </th>
              <th class="text-secondary fw-normal small pb-2">Phase</th>
              <th class="text-secondary fw-normal small pb-2">
                What's happening
              </th>
              <th class="text-secondary fw-normal small pb-2 text-end">Time</th>
              <th class="text-secondary fw-normal small pb-2 text-end">Size</th>
            </tr>
          </thead>
          <tbody id="packets-tbody"></tbody>
        </table>
      </div>
    </main>

    <!-- Packet detail modal -->
    <div class="modal fade" id="pktModal" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content bg-dark border border-secondary">
          <div class="modal-header border-secondary py-2 px-3">
            <div
              class="d-flex align-items-center gap-2 flex-wrap"
              id="modal-title"
            ></div>
            <button
              type="button"
              class="btn-close btn-close-white ms-auto"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div
            class="px-3 py-2 border-bottom border-secondary"
            style="background: rgba(255, 255, 255, 0.03)"
          >
            <span
              class="small"
              style="color: #94a3b8; font-style: italic"
              id="modal-narrative"
            ></span>
            <span class="text-secondary small ms-3" id="modal-meta"></span>
          </div>
          <div class="modal-body px-3 py-3" id="modal-body"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
