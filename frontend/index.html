<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BabyWireshark</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-dark text-light min-vh-100">

  <header class="border-bottom border-secondary px-4 py-3">
    <h1 class="fs-4 fw-semibold text-primary mb-0">BabyWireshark</h1>
    <p class="text-secondary small mb-0">A network packet analyser that takes you from request to packet</p>
  </header>

  <main class="container-lg py-4">

    <div class="d-flex gap-2 mb-3">
      <input type="text" id="url-input" class="form-control bg-dark text-light border-secondary"
             placeholder="https://example.com" />
      <button id="inspect-btn" class="btn btn-primary px-4" onclick="startInspect()">Inspect</button>
    </div>

    <div id="status-bar" class="alert d-none mb-3 py-2 small"></div>

    <div id="resolved-info" class="row g-2 mb-3 d-none"></div>

    <div id="packets-wrap"></div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
